<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>A Private Universe</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❤️</text></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet" />
<style>
:root {
  --obsidian:       #050204;
  --crimson-deep:   #8b0000;
  --crimson-vivid:  #ff1f44;
  --blush:          #e8a7a1;
  --white:          #f5eeee;
  --white-dim:      rgba(245,238,238,0.72);
  --font-script:    'Great Vibes', cursive;
  --font-display:   'Cormorant Garamond', serif;
  --font-body:      'Montserrat', sans-serif;
  --ease-silk:      cubic-bezier(0.25,0.46,0.45,0.94);
  --ease-bounce:    cubic-bezier(0.34,1.56,0.64,1);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: var(--obsidian);
  color: var(--white);
  font-family: var(--font-body);
  font-weight: 300;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
::selection { background: rgba(255,31,68,0.28); color: var(--white); }

/* PARTICLE CANVAS */
#particle-canvas {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  opacity: 1;
}

/* CURTAIN */
#curtain {
  position: fixed;
  inset: 0;
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 2rem;
  transition: opacity 1.6s var(--ease-silk), transform 1.6s var(--ease-silk);
}
#curtain.fade-out {
  opacity: 0;
  transform: scale(1.045);
  pointer-events: none;
}

.curtain-eyebrow {
  font-family: var(--font-body);
  font-weight: 400;
  font-size: clamp(0.6rem, 1.4vw, 0.75rem);
  letter-spacing: 0.5em;
  text-transform: uppercase;
  color: var(--blush);
  margin-bottom: 1.8rem;
  opacity: 0;
  animation: fadeUp 1.2s var(--ease-silk) 0.3s forwards;
}
.curtain-title {
  font-family: var(--font-script);
  font-size: clamp(3.2rem, 10vw, 7.8rem);
  line-height: 1.4 !important;
  padding-top: 0.3em;
  overflow: visible !important;
  color: var(--white);
  text-shadow: 0 0 80px rgba(255,31,68,0.35), 0 0 160px rgba(139,0,0,0.2);
  margin-bottom: 1.2rem;
  opacity: 0;
  animation: fadeUp 1.4s var(--ease-silk) 0.7s forwards;
}
.curtain-sub {
  font-family: var(--font-display);
  font-style: italic;
  font-size: clamp(0.95rem, 2.2vw, 1.3rem);
  color: var(--white-dim);
  max-width: 460px;
  margin-bottom: 3.5rem;
  opacity: 0;
  animation: fadeUp 1.2s var(--ease-silk) 1.1s forwards;
}

.enter-btn {
  position: relative;
  display: inline-flex;
  align-items: center;
  gap: 0.75rem;
  padding: 1rem 3rem;
  background: transparent;
  border: 1px solid rgba(232,167,161,0.5);
  color: var(--blush);
  font-family: var(--font-body);
  font-size: 0.72rem;
  font-weight: 500;
  letter-spacing: 0.42em;
  text-transform: uppercase;
  cursor: pointer;
  border-radius: 1px;
  transition: all 0.5s var(--ease-silk);
  overflow: hidden;
  opacity: 0;
  animation: fadeUp 1.2s var(--ease-silk) 1.5s forwards;
  text-decoration: none;
}
.enter-btn::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,31,68,0.14) 0%, rgba(139,0,0,0.18) 100%);
  transform: translateX(-100%);
  transition: transform 0.55s var(--ease-silk);
}
.enter-btn:hover::before { transform: translateX(0); }
.enter-btn:hover {
  box-shadow: 0 0 40px rgba(255,31,68,0.25), 0 0 90px rgba(139,0,0,0.12);
  color: var(--white);
  border-color: rgba(255,31,68,0.6);
  transform: translateY(-2px);
}
.enter-btn svg {
  width: 13px; height: 13px;
  stroke: currentColor;
  fill: none;
  stroke-width: 1.8;
  stroke-linecap: round;
  stroke-linejoin: round;
  transition: transform 0.4s var(--ease-bounce);
  flex-shrink: 0;
}
.enter-btn:hover svg { transform: translateX(5px); }

/* GLOWS */
.curtain-glow {
  position: absolute;
  border-radius: 50%;
  pointer-events: none;
  filter: blur(130px);
}
.curtain-glow-1 {
  width: 560px; height: 560px;
  background: radial-gradient(circle, rgba(139,0,0,0.16) 0%, transparent 70%);
  top: -140px; left: -120px;
  animation: glowDrift 9s ease-in-out infinite alternate;
}
.curtain-glow-2 {
  width: 420px; height: 420px;
  background: radial-gradient(circle, rgba(255,31,68,0.1) 0%, transparent 70%);
  bottom: -100px; right: -80px;
  animation: glowDrift 11s ease-in-out infinite alternate-reverse;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(22px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes glowDrift {
  from { transform: translate(0, 0) scale(1); }
  to   { transform: translate(30px, 20px) scale(1.08); }
}
</style>
</head>
<body>

<canvas id="particle-canvas" aria-hidden="true"></canvas>

<div id="curtain">
  <div class="curtain-glow curtain-glow-1" aria-hidden="true"></div>
  <div class="curtain-glow curtain-glow-2" aria-hidden="true"></div>
  <span class="curtain-eyebrow">A private universe, made only for you</span>
  <h1 class="curtain-title">You are my<br>everything</h1>
  <p class="curtain-sub">I didn't fall for you in one moment.<br>I fell slowly, in a thousand small ones<br>the way you laugh, the way you care<br>the way you make ordinary life<br>feel like the most extraordinary thing I've ever known.</p>
  <a class="enter-btn" id="enter-btn" href="universe.html">
    Enter Our World
    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
  </a>
</div>

<script>
/* PARTICLE ENGINE */
(function initParticles() {
  const canvas = document.getElementById('particle-canvas');
  const ctx = canvas.getContext('2d');
  let W, H;
  const particles = [];
  const HEART = '♥', SPARKS = ['·', '✦', '✧', '+'];

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resize, { passive: true });
  resize();

  const rand = (a, b) => a + Math.random() * (b - a);

  class Particle {
    constructor() { this.reset(true); }
    reset(initial) {
      this.x = rand(0, W); this.y = initial ? rand(0, H) : H + 20;
      this.vy = rand(0.28, 0.75); this.vx = rand(-0.18, 0.18);
      this.size = rand(8, 17); this.alpha = 0; this.targetA = rand(0.1, 0.32);
      this.fadeIn = true; this.life = 0; this.maxLife = rand(200, 360);
      this.isHeart = Math.random() > 0.38;
      this.char = this.isHeart ? HEART : SPARKS[Math.floor(Math.random() * SPARKS.length)];
      this.hue = this.isHeart ? rand(350, 360) : rand(35, 45);
      this.sat = this.isHeart ? rand(75, 100) : rand(65, 80);
      this.lit = this.isHeart ? rand(42, 62) : rand(62, 78);
    }
    update() {
      this.life++; this.y -= this.vy;
      this.x += Math.sin(this.life * 0.018 + this.x * 0.01) * 0.28 + this.vx;
      if (this.fadeIn) { this.alpha += 0.007; if (this.alpha >= this.targetA) this.fadeIn = false; }
      if (this.life > this.maxLife - 70) this.alpha -= this.targetA / 70;
      if (this.life > this.maxLife || this.y < -30) this.reset(false);
    }
    draw() {
      ctx.save(); ctx.globalAlpha = Math.max(0, this.alpha);
      ctx.font = `${this.size}px serif`; ctx.fillStyle = `hsl(${this.hue},${this.sat}%,${this.lit}%)`;
      ctx.shadowColor = this.isHeart ? `rgba(255,31,68,0.75)` : `rgba(210,170,90,0.7)`; ctx.shadowBlur = 14;
      ctx.fillText(this.char, this.x, this.y); ctx.restore();
    }
  }

  for (let i = 0; i < 55; i++) particles.push(new Particle());
  (function loop() { ctx.clearRect(0, 0, W, H); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(loop); })();
})();

/* Fade out before navigating so it feels intentional */
document.getElementById('enter-btn').addEventListener('click', function(e) {
  e.preventDefault();
  const dest = this.href;
  document.getElementById('curtain').classList.add('fade-out');
  setTimeout(() => { window.location.href = dest; }, 1000);
});
</script>
</body>
</html>
